        <div style="text-align: center;">
         <img src="images/textbook.jpg" alt="対策問題の画像" style="max-width: 100%; height: auto;">

     <div class="container" id="title-screen">

        <button class="btn" onclick="location.href='./quiz/11.html'">１節<br>人類の出現と文明のおこり</button>

     <div class="container" id="title-screen">
        <h2>入試対策<br>都立高校入試対策問題</h2>
        <p>　</p>
        <button class="btn" onclick="location.href='./quiz/21.html'">①<br>古代〜室町</button>
        <button class="btn" onclick="location.href='./quiz/22.html'">②<br>安土桃山〜戦後</button>

     <div class="container" id="title-screen">
        <button class="btn" style="background-color: #888; color: white;" onclick="location.href='../index.html'">トップページに戻る</button>
     </div>


    <footer class="copyright">
      ©️Shin Watanabe
    </footer>
    
    <script>

        let quizData = [];
        let currentQuestionIndex = 0;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function startQuiz() {
            document.getElementById("title-screen").classList.add("hidden");
            document.getElementById("quiz-screen").classList.remove("hidden");
            document.getElementById("end-screen").classList.add("hidden");

            shuffle(allQuizData);
            quizData = allQuizData.slice(0, 5); // 5問をランダム選出
            currentQuestionIndex = 0;
            loadQuestion();
        }

        function loadQuestion() {
            const questionData = quizData[currentQuestionIndex];
            document.getElementById("question").textContent = questionData.question;
            document.getElementById("choices").innerHTML = "";
            document.getElementById("result").textContent = "";
            document.getElementById("explanation").textContent = "";
            document.querySelector(".next-btn").style.display = "none";

            questionData.choices.forEach((choice, index) => {
                const button = document.createElement("button");
                button.textContent = choice;
                button.onclick = () => checkAnswer(index);
                document.getElementById("choices").appendChild(button);
            });
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            } else {
                document.getElementById("quiz-screen").classList.add("hidden");
                document.getElementById("end-screen").classList.remove("hidden");
            }
        }

        function returnToTitle() {
            document.getElementById("end-screen").classList.add("hidden");
            document.getElementById("title-screen").classList.remove("hidden");
        }
    </script>
</body>
</html>
